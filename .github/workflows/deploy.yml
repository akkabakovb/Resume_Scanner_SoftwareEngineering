name: CI/CD
on:
  push:
    branches: [master]
  workflow_dispatch:
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run linting
        run: |
          uv run ruff check . --fix
          uv run ruff format .
          
  coverage:
    name: Coverage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Run tests with coverage
        env:
          OPENAI_API_KEY: "dummy-key-for-testing"
        run: |
          mkdir -p coverage
          uv run coverage run --source=src/resume_scanner/app -m pytest
          uv run coverage lcov -o coverage/lcov.info
          uv run coverage report
      - name: Check coverage threshold
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 80
          exclude: '**/**/__init__.py tests/**'
  build:
    name: Build & Push
    needs: coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Build wheel
        run: uv build
      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v1.2.0
        id: doppler
        with:
          doppler-token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.doppler.outputs.DOCKER_USERNAME }}
          password: ${{ steps.doppler.outputs.DOCKER_PASSWORD }}
      - name: Build Docker image
        run: docker build --no-cache -t koras7/resume-analyzer:latest .
      - name: Push Docker image
        run: docker push koras7/resume-analyzer:latest
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v1.2.0
        id: doppler
        with:
          doppler-token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
      - name: Deploy over SSH
        uses: appleboy/ssh-action@master
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
        with:
          host: ${{ steps.doppler.outputs.AWS_IP }}
          username: ${{ steps.doppler.outputs.AWS_EC2_USERNAME }}
          key: ${{ steps.doppler.outputs.SSH_AWS_PEM }}
          envs: DOPPLER_TOKEN
          script: |
            sudo docker rm -f resume-analyzer || true
            sudo docker pull koras7/resume-analyzer:latest
            sudo docker run -d --name resume-analyzer -p 80:80 \
              -e DOPPLER_TOKEN="$DOPPLER_TOKEN" \
              koras7/resume-analyzer:latest
